      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:https://spzeyjwkefsfpahhrvov.supabase.co/auth/v1}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
